<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1730"/>
      <stop offset="100%" stop-color="#0c0c18"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a99fff"/>
      <stop offset="100%" stop-color="#7c6dfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)"/>

  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(124,109,250,0.25)" stroke-width="1"/>

  <!-- Kanban-style icon: 3 columns with staggered bars -->
  <g filter="url(#glow)" fill="url(#icon-grad)">
    <!-- Left column -->
    <rect x="12" y="20" width="10" height="24" rx="3"/>
    <!-- Middle column (taller) -->
    <rect x="27" y="14" width="10" height="36" rx="3"/>
    <!-- Right column -->
    <rect x="42" y="24" width="10" height="16" rx="3"/>
  </g>

  <!-- Checkmark overlay (bottom right accent) -->
  <circle cx="50" cy="50" r="9" fill="#7c6dfa"/>
  <polyline points="45.5,50 48.5,53 54.5,47" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>